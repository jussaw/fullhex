# pnpm settings (pnpm 11+ no longer reads the "pnpm" field in package.json).
# Neither native build is needed: no next/image usage (sharp), and the ESLint
# resolver works without its native binding (unrs-resolver).
allowBuilds:
  sharp: false
  unrs-resolver: false
# Keep cross-architecture binaries so a mac-built lockfile installs cleanly in the
# linux container during `docker build`.
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
    - arm64
